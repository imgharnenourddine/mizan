services:
  db:
    image: postgres:16-alpine
    container_name: mizan-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mizan}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_AUTO_SEED: ${DB_AUTO_SEED:-true}
      DB_SEED_FILE: ${DB_SEED_FILE:-local.dump}
    ports:
      - "${POSTGRES_PORT_HOST:-5432}:5432"
    volumes:
      - mizan-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
      - ./docker/postgres/seed:/seed:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-mizan}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    container_name: mizan-backend
    build:
      context: ./mizan-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-mizan}
      USE_LOCAL_DATABASE: "false"
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      SMTP_SERVER: ${SMTP_SERVER:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      MISTRAL_MODEL: ${MISTRAL_MODEL:-mistral-large-latest}
      MISTRAL_STT_MODEL: ${MISTRAL_STT_MODEL:-voxtral-mini-latest}
      MISTRAL_STT_LANGUAGE: ${MISTRAL_STT_LANGUAGE:-fr}
      MISTRAL_REALTIME_MODEL: ${MISTRAL_REALTIME_MODEL:-voxtral-mini-transcribe-realtime-2602}
      MISTRAL_REALTIME_SAMPLE_RATE: ${MISTRAL_REALTIME_SAMPLE_RATE:-16000}
      MISTRAL_REALTIME_TARGET_DELAY_MS: ${MISTRAL_REALTIME_TARGET_DELAY_MS:-700}
      MISTRAL_REALTIME_SERVER_URL: ${MISTRAL_REALTIME_SERVER_URL:-wss://api.mistral.ai}
      MISTRAL_TTS_MODEL: ${MISTRAL_TTS_MODEL:-voxtral-mini-tts-latest}
      MISTRAL_TTS_VOICE_ID: ${MISTRAL_TTS_VOICE_ID:-}
      MISTRAL_TTS_VOICE: ${MISTRAL_TTS_VOICE:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    expose:
      - "8000"

  frontend:
    container_name: mizan-frontend
    build:
      context: ./mizan-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws}
        NEXT_PUBLIC_AI_VOICE_VOLUME: ${NEXT_PUBLIC_AI_VOICE_VOLUME:-1}
        NEXT_PUBLIC_AI_VOICE_BOOST: ${NEXT_PUBLIC_AI_VOICE_BOOST:-1.8}
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "3000"

  frontend-mobile:
    container_name: mizan-frontend-mobile
    build:
      context: ./mizan-frontend-mobile
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws}
        NEXT_PUBLIC_AI_VOICE_VOLUME: ${NEXT_PUBLIC_AI_VOICE_VOLUME:-1}
        NEXT_PUBLIC_AI_VOICE_BOOST: ${NEXT_PUBLIC_AI_VOICE_BOOST:-1.8}
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "3000"

  nginx:
    image: nginx:1.25-alpine
    container_name: mizan-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./docker/nginx/certbot/conf:/etc/letsencrypt
      - ./docker/nginx/certbot/www:/var/www/certbot
    depends_on:
      - frontend
      - frontend-mobile
      - backend

  certbot:
    image: certbot/certbot
    container_name: mizan-certbot
    restart: unless-stopped
    volumes:
      - ./docker/nginx/certbot/conf:/etc/letsencrypt
      - ./docker/nginx/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  mizan-postgres-data:
