</div>
<div class="w-8 h-8 rounded-full bg-surface-container-highest overflow-hidden border border-outline-variant/15">

<!-- Main Canvas -->
<main class="flex-1 flex flex-col items-center justify-center px-8 pt-24 pb-32 max-w-lg mx-auto w-full">
<!-- Greeting Section -->
<section class="text-center space-y-2 mb-16">
<h1 class="text-[2.75rem] font-extrabold tracking-tight text-on-surface leading-tight">
                Bonjour, Marc
            </h1>
<p class="text-on-surface-variant text-lg font-medium opacity-80">
                Prêt pour votre check-in matinal ?
            </p>
</section>
<!-- Question Context -->
<section class="w-full mb-12">
<p class="font-label text-[0.75rem] uppercase tracking-[0.05em] text-on-surface-variant mb-6 text-center">
                VOTRE SOMMEIL
            </p>
<h2 class="text-2xl font-semibold text-center text-primary mb-8">
                Comment s'est passée votre nuit ?
            </h2>
<div class="flex flex-col gap-3 w-full">
<button class="w-full py-4 px-6 bg-surface-container-lowest border border-outline-variant/15 rounded-xl text-on-surface font-medium hover:bg-primary-fixed transition-all active:scale-[0.98] flex items-center justify-between group">
<span>Très reposante</span>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary">done</span>
</button>
<button class="w-full py-4 px-6 bg-surface-container-lowest border border-outline-variant/15 rounded-xl text-on-surface font-medium hover:bg-primary-fixed transition-all active:scale-[0.98] flex items-center justify-between group">
<span>Agitée</span>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary">done</span>
</button>
<button class="w-full py-4 px-6 bg-surface-container-lowest border border-outline-variant/15 rounded-xl text-on-surface font-medium hover:bg-primary-fixed transition-all active:scale-[0.98] flex items-center justify-between group">
<span>Courte</span>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary">done</span>
</button>
</div>
</section>
<!-- Voice-First Control (The Sanctuary Moment) -->
<section class="flex flex-col items-center">
<div class="relative group">
<!-- Decorative concentric circles for "pulse" effect -->
<div class="absolute inset-0 bg-primary/5 rounded-full scale-150 blur-3xl"></div>
<div class="absolute inset-0 bg-secondary/5 rounded-full scale-125 blur-2xl"></div>
<button class="relative w-28 h-28 bg-gradient-to-br from-primary to-primary-container rounded-full flex items-center justify-center mic-glow active:scale-90 transition-all duration-300 shadow-xl">
<span class="material-symbols-outlined text-white text-4xl" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
</div>
<p class="mt-8 font-label text-[0.75rem] uppercase tracking-widest text-on-surface-variant font-semibold">
                Appuyez pour parler
            </p>
</section>
</main>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-6 left-0 right-0 z-50 flex justify-around items-center px-4 py-3 mx-auto fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md rounded-full border border-white/20 bg-white/70 backdrop-blur-2xl shadow-[0_8px_24px_rgba(28,27,27,0.04)]">

</a>
